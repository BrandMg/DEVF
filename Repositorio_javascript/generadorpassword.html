<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Contraseñas</title>
    <link rel="stylesheet" href="generadorpassword.css">
</head>

<body>

<div class="container">

    <input type="text" id="password" placeholder="Aqui esta tu contraseña" readonly>

    <label>Longitud:</label>
    <input type="number" id="largo" min="4" max="20" value="8">

    <label><input type="checkbox" id="mayusculas"> Incluir mayusculas</label>
    <label><input type="checkbox" id="minusculas"> Incluir minusculas</label>
    <label><input type="checkbox" id="numeros"> Incluir numeros</label>
    <label><input type="checkbox" id="simbolos"> Incluir simbolos</label>

    <br>
    <button onclick="generarpassword()">GENERAR</button>

</div>

<script src="generadorpassword.js"></script>

</body>

</html>
